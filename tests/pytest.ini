[pytest]
# 只收集 tests/ 目录，避免根目录 test_*.py 被误扫
testpaths = tests

# 默认跳过 integration 标记的测试（可通过 -m integration 运行）
# 同时跳过 _archive/（历史遗留）和 _scratch/（临时调试）
addopts = -m "not integration" -k "not (test_server_config or test_stock_codes)" --ignore=tests/_archive --ignore=tests/_scratch

# 标记定义，避免警告
markers =
    integration: 标记集成/端到端测试（默认跳过）
